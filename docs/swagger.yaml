basePath: /v1
definitions:
  cairn_internal_billing.AdminOrgItem:
    properties:
      organization:
        $ref: '#/definitions/cairn_internal_model.Organization'
      subscription:
        $ref: '#/definitions/cairn_internal_billing.View'
    type: object
  cairn_internal_billing.View:
    properties:
      amount_due_cents:
        type: integer
      billing_enabled:
        type: boolean
      canceled_at:
        type: string
      created_at:
        type: string
      currency:
        type: string
      current_period_end:
        type: string
      current_period_start:
        type: string
      id:
        type: string
      organization_id:
        type: string
      plan:
        type: string
      price_per_seat_cents:
        type: integer
      seats:
        type: integer
      status:
        type: string
      trial_days:
        type: integer
      trial_days_remaining:
        type: integer
      trial_ends_at:
        type: string
      trial_expired:
        type: boolean
      updated_at:
        type: string
    type: object
  cairn_internal_model.Invitation:
    properties:
      accepted_at:
        type: string
      created_at:
        type: string
      email:
        type: string
      expires_at:
        type: string
      id:
        type: string
      invited_by:
        type: string
      organization_id:
        type: string
      role:
        type: string
    type: object
  cairn_internal_model.Member:
    properties:
      email:
        type: string
      joined_at:
        type: string
      name:
        type: string
      role:
        type: string
      user_id:
        type: string
    type: object
  cairn_internal_model.Organization:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      id:
        type: string
      name:
        type: string
      slug:
        type: string
      updated_at:
        type: string
    type: object
  internal_http.acceptInviteRequest:
    properties:
      status:
        description: must be "accepted"
        type: string
    type: object
  internal_http.appSettingsDTO:
    properties:
      default_trial_days:
        type: integer
      updated_at:
        type: string
    type: object
  internal_http.authResponse:
    properties:
      access_token:
        type: string
      expires_at:
        type: string
      user:
        $ref: '#/definitions/internal_http.userDTO'
    type: object
  internal_http.createOrgRequest:
    properties:
      billing_enabled:
        description: |-
          BillingEnabled starts a subscription/trial for the org. Honored only when
          the creator is a platform admin; ignored otherwise.
        type: boolean
      name:
        type: string
    type: object
  internal_http.errorEnvelope:
    properties:
      error:
        type: string
      message:
        type: string
      status:
        type: integer
      success:
        type: boolean
    type: object
  internal_http.inviteRequest:
    properties:
      email:
        type: string
      role:
        type: string
    type: object
  internal_http.inviteResponse:
    properties:
      accept_url:
        type: string
      invitation:
        $ref: '#/definitions/cairn_internal_model.Invitation'
    type: object
  internal_http.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  internal_http.orgWithRole:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
      slug:
        type: string
      updated_at:
        type: string
    type: object
  internal_http.signupRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  internal_http.updateRoleRequest:
    properties:
      role:
        type: string
    type: object
  internal_http.updateSettingsRequest:
    properties:
      default_trial_days:
        type: integer
    type: object
  internal_http.updateSubscriptionRequest:
    properties:
      billing_enabled:
        type: boolean
      currency:
        type: string
      price_per_seat_cents:
        type: integer
      status:
        type: string
      trial_days:
        type: integer
    type: object
  internal_http.userDTO:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_platform_admin:
        type: boolean
      name:
        type: string
    type: object
host: localhost:8000
info:
  contact: {}
  description: Organization-wide project & issue tracking API (Jira-class, org-scoped).
  title: Cairn API
  version: 0.1.0
paths:
  /admin/orgs:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/cairn_internal_billing.AdminOrgItem'
            type: array
      security:
      - BearerAuth: []
      summary: List all organizations (admin)
      tags:
      - admin
  /admin/orgs/{orgID}/subscription:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Organization ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Subscription changes
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http.updateSubscriptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cairn_internal_billing.View'
      security:
      - BearerAuth: []
      summary: Update an org subscription (admin)
      tags:
      - admin
  /admin/settings:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_http.appSettingsDTO'
      security:
      - BearerAuth: []
      summary: Get platform settings
      tags:
      - admin
    patch:
      consumes:
      - application/json
      parameters:
      - description: Settings
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http.updateSettingsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_http.appSettingsDTO'
      security:
      - BearerAuth: []
      summary: Update platform settings
      tags:
      - admin
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_http.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
      summary: Log in
      tags:
      - auth
  /auth/logout:
    post:
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      summary: Log out
      tags:
      - auth
  /auth/oauth/{provider}:
    get:
      description: Redirects to the provider (google or microsoft) authorization endpoint.
      parameters:
      - description: google or microsoft
        in: path
        name: provider
        required: true
        type: string
      responses:
        "302":
          description: Found
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
      summary: Begin SSO login
      tags:
      - auth
  /auth/oauth/{provider}/callback:
    get:
      parameters:
      - description: google or microsoft
        in: path
        name: provider
        required: true
        type: string
      - description: authorization code
        in: query
        name: code
        type: string
      - description: CSRF state
        in: query
        name: state
        type: string
      responses:
        "302":
          description: Found
      summary: SSO callback
      tags:
      - auth
  /auth/refresh:
    post:
      description: Uses the httpOnly refresh cookie to mint a new access token (and
        rotate the refresh token).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_http.authResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
      summary: Refresh access token
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      parameters:
      - description: Signup payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http.signupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_http.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
      summary: Register a new user
      tags:
      - auth
  /invitations/{token}:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Invitation token
        in: path
        name: token
        required: true
        type: string
      - description: Set status to accepted
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http.acceptInviteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cairn_internal_model.Organization'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Accept an invitation
      tags:
      - invitations
  /me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_http.userDTO'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Current user
      tags:
      - auth
  /orgs:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/cairn_internal_model.Organization'
            type: array
      security:
      - BearerAuth: []
      summary: List my organizations
      tags:
      - organizations
    post:
      consumes:
      - application/json
      parameters:
      - description: Org payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http.createOrgRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/cairn_internal_model.Organization'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Create organization
      tags:
      - organizations
  /orgs/{orgID}:
    get:
      parameters:
      - description: Organization ID
        in: path
        name: orgID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_http.orgWithRole'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Get organization
      tags:
      - organizations
    patch:
      consumes:
      - application/json
      parameters:
      - description: Organization ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http.createOrgRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cairn_internal_model.Organization'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Update organization
      tags:
      - organizations
  /orgs/{orgID}/invitations:
    get:
      parameters:
      - description: Organization ID
        in: path
        name: orgID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/cairn_internal_model.Invitation'
            type: array
      security:
      - BearerAuth: []
      summary: List pending invitations
      tags:
      - invitations
    post:
      consumes:
      - application/json
      parameters:
      - description: Organization ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Invite payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http.inviteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_http.inviteResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Invite a member
      tags:
      - invitations
  /orgs/{orgID}/invitations/{inviteID}:
    delete:
      parameters:
      - description: Organization ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Invitation ID
        in: path
        name: inviteID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Revoke an invitation
      tags:
      - invitations
  /orgs/{orgID}/members:
    get:
      parameters:
      - description: Organization ID
        in: path
        name: orgID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/cairn_internal_model.Member'
            type: array
      security:
      - BearerAuth: []
      summary: List members
      tags:
      - members
  /orgs/{orgID}/members/{userID}:
    delete:
      parameters:
      - description: Organization ID
        in: path
        name: orgID
        required: true
        type: string
      - description: User ID
        in: path
        name: userID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Remove member
      tags:
      - members
    patch:
      consumes:
      - application/json
      parameters:
      - description: Organization ID
        in: path
        name: orgID
        required: true
        type: string
      - description: User ID
        in: path
        name: userID
        required: true
        type: string
      - description: New role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http.updateRoleRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_http.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Update member role
      tags:
      - members
  /orgs/{orgID}/subscription:
    get:
      parameters:
      - description: Organization ID
        in: path
        name: orgID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cairn_internal_billing.View'
      security:
      - BearerAuth: []
      summary: Get organization subscription
      tags:
      - billing
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and the access token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
