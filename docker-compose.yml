# Optional local stack. If you already use a managed DATABASE_URL (e.g. Prisma
# Postgres) you can run just the api with `go run ./cmd/api` and skip this.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cairn
      POSTGRES_PASSWORD: cairn
      POSTGRES_DB: cairn
    ports:
      - "5432:5432"
    volumes:
      - cairn_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cairn"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      PORT: "8000"
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgres://cairn:cairn@db:5432/cairn?sslmode=disable
    ports:
      - "8000:8000"

volumes:
  cairn_pgdata:
